# ============================================================
# Guardrail Rules — .claude/guardrail-rules.yaml
# ============================================================
#
# This file configures the PreToolUse:Bash guardrail hook
# (.claude/hooks/guardrail.cjs). Rules are evaluated in order
# within each section. The first match wins.
#
# HOW RULES WORK
# ==============
# Each entry under block_patterns or confirm_patterns is a
# pattern string checked against the full bash command.
#
# Pattern formats:
#   plain string  — case-insensitive substring match
#                   e.g. "rm -rf" matches "sudo rm -rf /"
#
#   /regex/       — JavaScript regex (case-insensitive)
#                   e.g. "/git push -+f/" matches any -f or --force flag
#
# KNOWN LIMITATION — SUBSTRING MATCHING
# ======================================
# Plain string patterns match anywhere in the command string.
# This means a pattern like "DROP TABLE" will also match:
#   - echo "run DROP TABLE to clean up" >> notes.md
#   - grep -r "DROP TABLE" src/
# Use /anchored-regex/ patterns for SQL keywords and other terms
# that may legitimately appear inside echo, grep, or comment strings.
# Double-spaced or tab-separated variants of blocked commands
# (e.g. "git  reset  --hard") will NOT match plain string patterns.
#
# Exit codes produced by the hook:
#   2  — BLOCKED   command is hard-stopped (only exit code 2 blocks in Claude Code)
#   0 + JSON "ask" — CONFIRM   user is prompted yes/no before proceeding
#   0  — PASS      command is safe, no output, execution continues
#   1  — WARNING   Claude Code treats this as non-blocking, command STILL RUNS
#
# HOW TO ADD CUSTOM RULES
# =======================
# 1. Add a pattern string under block_patterns or confirm_patterns.
# 2. Use a plain substring for simple matches.
# 3. Use /regex/ for multi-variant patterns (flags, alternatives).
# 4. Comment the rule inline to document why it exists.
# 5. Save the file — changes apply immediately on the next hook invocation.
#
# HOW TO TEMPORARILY DISABLE A RULE
# ===================================
# Comment out the line with #. The YAML parser strips inline comments,
# so "- rm -rf   # disabled" still fires. Move the rule to a comment-only
# block or delete the line entirely to disable it.
#
# ============================================================

# ============================================================
# BLOCK PATTERNS (hard block — exit 2, no option to proceed)
# ============================================================
# Catastrophic / irreversible commands that have no legitimate
# automated use. If you actually need these, run them manually
# in your terminal.
# ============================================================

block_patterns:

  # --- Git: Force push (overwrites remote history, cannot be undone) ---
  - git push --force
  - git push -f

  # --- Database: Schema destruction ---
  # Anchored regexes prevent false positives on echo/grep commands that
  # mention these SQL keywords in strings or test names.
  - /^\s*(DROP\s+TABLE|DROP\s+DATABASE|DROP\s+SCHEMA)/i   # destroys tables, databases, or schemas
  - /^\s*TRUNCATE\s+/i                                     # empties all rows (no rollback without explicit txn)

  # --- Disk / OS: Low-level format commands ---
  - format c:                          # Windows disk format
  - mkfs                               # Linux filesystem format (any variant: mkfs.ext4, etc.)
  - dd if=/dev/zero                    # zero-wipe a block device
  - /dd if=\/dev\/random/              # random-wipe a block device
  - fdisk                              # interactive partition editor (destructive if scripted)
  - diskpart                           # Windows partition manager (destructive if scripted)


# ============================================================
# CONFIRM PATTERNS (user prompted yes/no before proceeding)
# ============================================================
# Risky but legitimate. You'll be asked before these run.
# ============================================================

confirm_patterns:

  # --- Git: Working tree destruction ---
  - git reset --hard                   # discards all uncommitted changes
  - /git reset(?! --hard)/             # git reset without --hard (mixed/soft modes)
  - git checkout -- .                  # bulk-resets tracked files
  - git clean -f                       # deletes untracked files
  - git clean -fd                      # also removes untracked directories
  - git clean -fX                      # removes gitignored files

  # --- Git: Remote branch/tag operations ---
  - git push origin --delete           # deletes a remote branch or tag
  - /git push .+:refs\/tags\//         # deletes a remote tag
  - /git push .+--force-with-lease/    # safer force push, but still rewrites remote

  # --- Git: History rewriting ---
  - git rebase                         # rewrites commit history
  - git commit --amend                 # rewrites last commit

  # --- Git: Stash destruction ---
  - git stash drop                     # permanently removes a stash entry
  - git stash clear                    # permanently removes ALL stash entries

  # --- Filesystem: Recursive deletion ---
  - rm -rf                             # recursive force remove
  - rm -fr                             # alternate flag order
  - /del \/s \/q/                      # Windows: silent recursive delete (cmd.exe)
  - /Remove-Item .+-Recurse .+-Force/  # PowerShell: recursive force remove

  # --- Package management ---
  - npm uninstall -g                   # globally removes packages
  - npm publish                        # publishing to npm registry (irreversible)

  # --- File: Bulk write/overwrite operations ---
  - /find .+ -exec .+ \{\}/            # find -exec can silently overwrite many files


# ============================================================
# PATH RULES
# ============================================================
# Reserved for future path-based access control.
# The hook does not currently enforce these — they serve as
# documented placeholders for upcoming path_rules enforcement.
#
# Future behavior:
#   zero_access  — any Bash command touching these paths is blocked (exit 1)
#   read_only    — write/delete commands targeting these paths are blocked (exit 1)
# ============================================================

path_rules:

  # Paths that should NEVER be touched by any automated command.
  # Add absolute or relative paths. Wildcards are not yet supported.
  zero_access:
    - .env                             # root .env (local secrets)
    - .env.local                       # local override secrets
    - .env.production                  # production secrets
    - .githooks/                       # git hook scripts (security boundary)

  # Paths that can be read but must not be overwritten or deleted.
  read_only:
    - .claude/settings.json            # hook registry — only the orchestrator edits this
    - package-lock.json                # lockfile — only npm manages this
    - docs/_project-architecture.md            # architecture source of truth
